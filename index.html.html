<script type="text/babel" data-presets="react">

const { useState, useEffect, useMemo, useRef } = React;
const SB = { url: "https://xuxubirowdouuopwjufl.supabase.co", key: "sb_publishable_SSREVvBR2vstSWk8qgSsfA_xwa09DhT" };
function genToken(){ const a = new Uint8Array(16); crypto.getRandomValues(a); return Array.from(a).map(b => b.toString(16).padStart(2,"0")).join(""); }
function readToken(){ const m = (location.hash||"").match(/g=([a-zA-Z0-9]+)/); return m ? m[1] : null; }
let TOKEN = readToken();
let cache = {};
let saveTimer = null;
async function cloudLoad(){
  try { const ls = localStorage.getItem("blob:" + TOKEN); if(ls) cache = JSON.parse(ls); } catch(e){}
  if(!SB.url || !TOKEN) return;
  try {
    const r = await fetch(SB.url + "/rest/v1/rpc/get_budget", { method: "POST", headers: { "Content-Type":"application/json", "apikey": SB.key, "Authorization": "Bearer " + SB.key }, body: JSON.stringify({ p_id: TOKEN }) });
    if(r.ok){ const d = await r.json(); if(d && typeof d === "object") cache = d; }
  } catch(e){}
}
function scheduleSave(){
  try { localStorage.setItem("blob:" + TOKEN, JSON.stringify(cache)); } catch(e){}
  if(!SB.url || !TOKEN) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { await fetch(SB.url + "/rest/v1/rpc/save_budget", { method: "POST", headers: { "Content-Type":"application/json", "apikey": SB.key, "Authorization": "Bearer " + SB.key }, body: JSON.stringify({ p_id: TOKEN, p_data: cache }) }); } catch(e){}
  }, 700);
}
window.storage = {
  async get(key){ return cache[key] !== undefined ? { key, value: cache[key] } : null; },
  async set(key, value){ cache[key] = value; scheduleSave(); return { key, value }; },
  async delete(key){ delete cache[key]; scheduleSave(); return { key, deleted: true }; },
  async list(prefix){ const keys = Object.keys(cache).filter(k => !prefix || k.indexOf(prefix) === 0); return { keys, prefix }; }
};


const C = {
  paper: "#FBF8F1", surface: "#FFFFFF", line: "#E7E0D2", lineSoft: "#F0EADC",
  ink: "#2C271F", muted: "#9A9081", faint: "#C7BFB0",
  seal: "#C8553D", good: "#4F7A52", goodSoft: "#E6EEE3",
  over: "#B23A2E", overSoft: "#F6E2DE", budgetInk: "#3B5169",
};

const CATS = [
  { id: "food", label: "食費", color: "#C8553D" },
  { id: "eatout", label: "外食", color: "#E08A5B" },
  { id: "daily", label: "日用品", color: "#C99846" },
  { id: "transit", label: "交通", color: "#5A8CA3" },
  { id: "hobby", label: "趣味・娯楽", color: "#7B6CA8" },
  { id: "clothes", label: "衣服", color: "#B07AA1" },
  { id: "health", label: "美容・健康", color: "#4F7A52" },
  { id: "social", label: "交際費", color: "#3B5169" },
  { id: "home", label: "住居・光熱", color: "#6B8E7F" },
  { id: "other", label: "その他", color: "#9A8C5E" },
];
const CAT_BY_ID = Object.fromEntries(CATS.map((c) => [c.id, c]));
const catOf = (id) => CAT_BY_ID[id] || CAT_BY_ID.other;
const PALETTE = ["#4F7A52", "#3B5169", "#C99846", "#7B6CA8", "#C8553D", "#5A8CA3", "#B07AA1", "#6B8E7F", "#E08A5B", "#9A8C5E"];

const BANKS = ["三菱UFJ銀行", "三井住友銀行", "みずほ銀行", "りそな銀行", "ゆうちょ銀行", "楽天銀行", "PayPay銀行", "住信SBIネット銀行", "SBI新生銀行", "イオン銀行", "地方銀行", "ネット銀行"];

const CASH_COLOR = "#5C7C6F", CARD_COLOR = "#3B5169";
const isCardPay = (pay) => !!pay && pay !== "cash";
const resolvePay = (pay, cards) => {
  if (!pay || pay === "cash") return "cash";
  if (cards.some((c) => c.id === pay)) return pay;
  return cards[0] ? cards[0].id : "cash";
};
const cardName = (id, cards) => { const c = cards.find((x) => x.id === id); return c ? c.name || "カード" : "カード"; };

const WEEK = ["日", "月", "火", "水", "木", "金", "土"];
const FONT = '"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",YuGothic,"Noto Sans JP",sans-serif';

const yen = (n) => "¥" + new Intl.NumberFormat("ja-JP").format(Math.round(n || 0));
const pad = (n) => String(n).padStart(2, "0");
const keyOf = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
const mkey = (view) => `${view.y}-${pad(view.m + 1)}`;
const uid = () => Math.random().toString(36).slice(2, 9);
const numOf = (v) => parseInt(v, 10) || 0;

const actualOf = (e) => {
  if (!e) return 0;
  if (Array.isArray(e.items)) return e.items.reduce((s, it) => s + (it.amount || 0), 0);
  return e.actual || 0;
};
const hasEntry = (e) => !!e && ((e.budget || 0) > 0 || actualOf(e) > 0);

const monthSplit = (data, keys) => {
  let cash = 0, card = 0;
  keys.forEach((k) => {
    const e = data[k];
    if (!e || !Array.isArray(e.items)) return;
    e.items.forEach((it) => { if (!it.amount) return; if (isCardPay(it.pay)) card += it.amount; else cash += it.amount; });
  });
  return { cash, card };
};
const monthByCard = (data, keys, cards) => {
  const res = {};
  cards.forEach((c) => (res[c.id] = 0));
  keys.forEach((k) => {
    const e = data[k];
    if (!e || !Array.isArray(e.items)) return;
    e.items.forEach((it) => {
      if (!it.amount || !isCardPay(it.pay)) return;
      const cid = res[it.pay] !== undefined ? it.pay : cards[0] && cards[0].id;
      if (cid !== undefined && cid !== false) res[cid] = (res[cid] || 0) + it.amount;
    });
  });
  return res;
};

// pay-cycle period: anchor month {y,m} + start day -> actual date range (spans two calendar months when start>1)
const anchorForDate = (date, cs) => { let y = date.getFullYear(), m = date.getMonth(); if (date.getDate() < cs) { m -= 1; if (m < 0) { m = 11; y--; } } return { y, m }; };
function periodInfo(view, cs) {
  const start = new Date(view.y, view.m, cs);
  const end = new Date(view.y, view.m + 1, cs); end.setDate(end.getDate() - 1);
  const days = []; const d = new Date(start);
  while (d <= end) { days.push({ y: d.getFullYear(), m: d.getMonth(), d: d.getDate(), key: keyOf(d.getFullYear(), d.getMonth(), d.getDate()) }); d.setDate(d.getDate() + 1); }
  return { start, end, days, keys: days.map((x) => x.key) };
}

const DEFAULT_META = { banks: [], cards: [], cardFix: {}, income: {}, alloc: {}, budget: {}, carryOn: true, savings: [], cycleStart: 1, presets: [], fixed: [], fixedApplied: {}, lastPay: "cash" };
function normalizeMeta(p) {
  p = p || {};
  const m = {
    banks: Array.isArray(p.banks) ? p.banks : [],
    cards: Array.isArray(p.cards) ? p.cards : [],
    cardFix: p.cardFix && typeof p.cardFix === "object" ? { ...p.cardFix } : {},
    income: p.income || {}, alloc: p.alloc || {},
    budget: p.budget && typeof p.budget === "object" ? { ...p.budget } : {},
    carryOn: p.carryOn !== undefined ? !!p.carryOn : true,
    savings: Array.isArray(p.savings) ? p.savings : [],
    cycleStart: p.cycleStart >= 1 && p.cycleStart <= 28 ? p.cycleStart : 1,
    presets: Array.isArray(p.presets) ? p.presets : [],
    fixed: Array.isArray(p.fixed) ? p.fixed : [],
    fixedApplied: p.fixedApplied && typeof p.fixedApplied === "object" ? { ...p.fixedApplied } : {},
    lastPay: typeof p.lastPay === "string" && p.lastPay ? p.lastPay : "cash",
  };
  if (m.banks.length === 0) m.banks = [{ id: "bank1", name: "口座", amount: p.bank !== undefined && p.bank !== null ? String(p.bank) : "" }];
  if (m.cards.length === 0) m.cards = [{ id: "card1", name: "カード" }];
  const fx = {};
  Object.entries(m.cardFix).forEach(([k, v]) => { if (v && typeof v === "object") fx[k] = v; else if (v !== "" && v != null) fx[k] = { [m.cards[0].id]: String(v) }; });
  m.cardFix = fx;
  return m;
}

const prevView = (v) => { let m = v.m - 1, y = v.y; if (m < 0) { m = 11; y--; } return { y, m }; };
// actual spending within a period (respects cycle start day)
function actualSpentOf(data, view, cs) {
  const p = periodInfo(view, cs);
  let a = 0;
  p.keys.forEach((k) => { const v = data && data[k]; if (v) a += actualOf(v); });
  return a;
}
// previous-period leftover (income + its own carryover − allocations − ACTUAL spending), chained
function leftoverOf(meta, data, cs, view, depth) {
  depth = depth || 0;
  if (depth > 24) return 0;
  const mk = mkey(view);
  const inc = ((meta.income && meta.income[mk]) || []).reduce((s, i) => s + numOf(i.amount), 0);
  const alloc = ((meta.alloc && meta.alloc[mk]) || []).reduce((s, i) => s + numOf(i.amount), 0);
  const spent = actualSpentOf(data, view, cs);
  const carry = meta.carryOn !== false ? leftoverOf(meta, data, cs, prevView(view), depth + 1) : 0;
  return inc + carry - alloc - spent;
}

function BudgetCalendar() {
  const today = new Date();
  const [view, setView] = useState({ y: today.getFullYear(), m: today.getMonth() });
  const [data, setData] = useState({});
  const [meta, setMeta] = useState(DEFAULT_META);
  const [loaded, setLoaded] = useState(false);
  const [sel, setSel] = useState(null);
  const [showExport, setShowExport] = useState(false);
  const [tab, setTab] = useState("cal");

  useEffect(() => {
    (async () => {
      try { const res = await window.storage.get("budget-entries"); if (res && res.value) setData(JSON.parse(res.value)); } catch (e) {}
      let parsed = null;
      try { const m = await window.storage.get("budget-meta"); if (m && m.value) parsed = JSON.parse(m.value); } catch (e) {}
      if (!parsed) { try { const b = await window.storage.get("budget-bank"); if (b && b.value) parsed = { bank: String(b.value) }; } catch (e) {} }
      const nm = normalizeMeta(parsed);
      setMeta(nm);
      setView(anchorForDate(new Date(), nm.cycleStart));
      setLoaded(true);
    })();
  }, []);

  const persist = async (next) => { setData(next); try { await window.storage.set("budget-entries", JSON.stringify(next)); } catch (e) {} };
  const persistMeta = async (next) => { setMeta(next); try { await window.storage.set("budget-meta", JSON.stringify(next)); } catch (e) {} };

  const cs = meta.cycleStart >= 1 && meta.cycleStart <= 28 ? meta.cycleStart : 1;
  const period = useMemo(() => periodInfo(view, cs), [view.y, view.m, cs]);

  const cells = useMemo(() => {
    const startWd = period.days.length ? new Date(period.days[0].y, period.days[0].m, period.days[0].d).getDay() : 0;
    const arr = [];
    for (let i = 0; i < startWd; i++) arr.push(null);
    period.days.forEach((dd) => arr.push(dd));
    while (arr.length % 7 !== 0) arr.push(null);
    return arr;
  }, [period]);

  const totals = useMemo(() => {
    let daySum = 0, a = 0;
    period.keys.forEach((k) => { const v = data[k]; if (v) { daySum += v.budget || 0; a += actualOf(v); } });
    const mB = numOf((meta.budget || {})[mkey(view)]);
    const b = mB > 0 ? mB : daySum;
    return { b, a, diff: b - a };
  }, [data, period, meta, view]);

  const isToday = (dd) => dd.y === today.getFullYear() && dd.m === today.getMonth() && dd.d === today.getDate();

  const saveDay = (dateKey, budgetCash, budgetCard, items) => {
    const next = { ...data };
    const clean = items.map((it) => ({ cat: it.cat || "other", amount: numOf(it.amount), pay: it.pay === "cash" ? "cash" : it.pay })).filter((it) => it.amount > 0);
    const bc = budgetCash || 0, bd = budgetCard || 0, bt = bc + bd;
    if (bt <= 0 && clean.length === 0) delete next[dateKey];
    else next[dateKey] = { budget: bt, budgetCash: bc, budgetCard: bd, items: clean };
    persist(next); setSel(null);
    if (clean.length) persistMeta({ ...meta, lastPay: clean[clean.length - 1].pay });
  };

  // append items to a day without touching its budgets
  const addItemsToDay = (dateKey, newItems, metaPatch) => {
    const clean = newItems.map((it) => ({ cat: it.cat || "other", amount: numOf(it.amount), pay: it.pay === "cash" ? "cash" : it.pay })).filter((it) => it.amount > 0);
    if (!clean.length) return;
    const next = { ...data };
    const cur = next[dateKey] || { budget: 0, items: [] };
    next[dateKey] = { ...cur, items: [...(cur.items || []), ...clean] };
    persist(next);
    persistMeta({ ...(metaPatch || meta), lastPay: clean[clean.length - 1].pay });
  };

  const todayKey = keyOf(today.getFullYear(), today.getMonth(), today.getDate());
  const [quick, setQuick] = useState(false);

  // recent items (latest first, deduped by cat+amount+pay, max 6)
  const recentItems = useMemo(() => {
    const keys = Object.keys(data).sort().reverse();
    const out = []; const seen = {};
    for (const k of keys) {
      const e = data[k]; if (!e || !Array.isArray(e.items)) continue;
      for (let i = e.items.length - 1; i >= 0; i--) {
        const it = e.items[i]; if (!it || !(it.amount > 0)) continue;
        const sig = (it.cat || "other") + "|" + it.amount + "|" + (it.pay || "cash");
        if (seen[sig]) continue; seen[sig] = 1;
        out.push({ cat: it.cat || "other", amount: it.amount, pay: it.pay || "cash" });
        if (out.length >= 6) return out;
      }
    }
    return out;
  }, [data]);

  // fixed costs: auto-record once per calendar month when their day has arrived
  useEffect(() => {
    if (!loaded) return;
    const fixed = meta.fixed || [];
    if (!fixed.length) return;
    const y = today.getFullYear(), m = today.getMonth();
    const mk = `${y}-${String(m + 1).padStart(2, "0")}`;
    const applied = (meta.fixedApplied && meta.fixedApplied[mk]) || [];
    const due = fixed.filter((f) => f && numOf(f.amount) > 0 && !applied.includes(f.id) && today.getDate() >= Math.min(Math.max(1, f.day || 1), 28));
    if (!due.length) return;
    const next = { ...data };
    due.forEach((f) => {
      const dk = keyOf(y, m, Math.min(Math.max(1, f.day || 1), 28));
      const cur = next[dk] || { budget: 0, items: [] };
      next[dk] = { ...cur, items: [...(cur.items || []), { cat: CAT_BY_ID[f.cat] ? f.cat : "other", amount: numOf(f.amount), pay: f.pay || "cash" }] };
    });
    persist(next);
    persistMeta({ ...meta, fixedApplied: { ...(meta.fixedApplied || {}), [mk]: [...applied, ...due.map((f) => f.id)] } });
  }, [loaded, meta.fixed]);
  const clearDay = (dateKey) => { const next = { ...data }; delete next[dateKey]; persist(next); setSel(null); };
  const shiftMonth = (dir) => setView((v) => { let m = v.m + dir, y = v.y; if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; } return { y, m }; });

  const buildCSV = () => {
    const cards = meta.cards || [];
    const keys = Object.keys(data).sort();
    const rows = ["日付,予算,支出,現金,カード,差額,内訳"];
    keys.forEach((k) => {
      const e = data[k]; const b = e.budget || 0, a = actualOf(e);
      let cash = 0, card = 0, breakdown = "";
      if (Array.isArray(e.items)) breakdown = e.items.map((it) => {
        const label = isCardPay(it.pay) ? cardName(resolvePay(it.pay, cards), cards) : "現金";
        if (isCardPay(it.pay)) card += it.amount; else cash += it.amount;
        return `${catOf(it.cat).label}・${label}:${it.amount}`;
      }).join(" / ");
      rows.push(`${k},${b},${a},${cash},${card},${b - a},"${breakdown.replace(/"/g, '""')}"`);
    });
    return { text: rows.join("\n"), count: keys.length };
  };

  const buildBackup = () => JSON.stringify({ v: 1, entries: data, meta });
  const restoreBackup = (text) => {
    let p;
    try { p = JSON.parse(text); } catch (e) { return "形式が正しくありません。バックアップ全体を貼り付けてください。"; }
    if (!p || typeof p !== "object" || !p.entries) return "バックアップの中身が読み取れませんでした。";
    persist(p.entries || {});
    if (p.meta) persistMeta(normalizeMeta(p.meta));
    return "";
  };

  return (
    <div style={{ minHeight: "100vh", background: C.paper, color: C.ink, fontFamily: FONT, padding: "20px 14px 40px", WebkitFontSmoothing: "antialiased" }}>
      <div style={{ maxWidth: 460, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: C.seal, display: "inline-block", transform: "translateY(-2px)" }} />
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, letterSpacing: 1 }}>家計簿カレンダー</h1>
          </div>
          <button onClick={() => setShowExport(true)} style={{ fontSize: 12, fontWeight: 600, color: C.budgetInk, fontFamily: FONT, background: C.surface, border: `1px solid ${C.line}`, borderRadius: 10, padding: "7px 12px", cursor: "pointer" }}>書き出す</button>
        </div>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <NavBtn onClick={() => shiftMonth(-1)} label="前の月">‹</NavBtn>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 13, color: C.muted, letterSpacing: 2 }}>{period.start.getFullYear()}</div>
            {cs === 1 ? (
              <div style={{ fontSize: 26, fontWeight: 700, lineHeight: 1.1 }}>{view.m + 1}<span style={{ fontSize: 15, marginLeft: 2 }}>月</span></div>
            ) : (
              <div style={{ fontSize: 18, fontWeight: 700, lineHeight: 1.15 }}>{period.start.getMonth() + 1}/{period.start.getDate()} – {period.end.getMonth() + 1}/{period.end.getDate()}</div>
            )}
          </div>
          <NavBtn onClick={() => shiftMonth(1)} label="次の月">›</NavBtn>
        </div>

        <Summary totals={totals} />

        <div style={{ display: "flex", gap: 6, background: C.lineSoft, padding: 4, borderRadius: 12, marginBottom: 16 }}>
          {[["cal", "カレンダー"], ["analysis", "分析"], ["funds", "資金"]].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: FONT, background: tab === id ? C.surface : "transparent", color: tab === id ? C.ink : C.muted, boxShadow: tab === id ? "0 1px 2px rgba(44,39,31,.08)" : "none" }}>{label}</button>
          ))}
        </div>

        {tab === "cal" && (
          <>
            <BudgetRemaining totals={totals} period={period} today={today} />
            <button onClick={() => setQuick(true)} style={{ width: "100%", marginBottom: 14, padding: "13px 0", borderRadius: 13, border: "none", background: C.seal, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: FONT, boxShadow: "0 2px 6px rgba(200,85,61,.25)" }}>＋ 今日に追加</button>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", marginBottom: 4 }}>
              {WEEK.map((w, i) => (<div key={w} style={{ textAlign: "center", fontSize: 11, padding: "6px 0", fontWeight: 600, color: i === 0 ? C.seal : i === 6 ? C.budgetInk : C.muted }}>{w}</div>))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, opacity: loaded ? 1 : 0.4, transition: "opacity .25s" }}>
              {cells.map((c, i) => { if (c === null) return <div key={i} />; const e = data[c.key]; return <DayCell key={c.key} day={c.d} monthTag={c.d === 1 ? `${c.m + 1}月` : null} entry={e} today={isToday(c)} onClick={() => setSel(c.key)} />; })}
            </div>
            <p style={{ fontSize: 11, color: C.faint, textAlign: "center", marginTop: 18 }}>日付をタップして予算と使ったものを入力</p>
          </>
        )}
        {tab === "analysis" && <Analysis data={data} periodKeys={period.keys} />}
        {tab === "funds" && <Funds data={data} view={view} meta={meta} onMeta={persistMeta} periodKeys={period.keys} />}
      </div>

      {sel && (<Editor key={sel} dateKey={sel} entry={data[sel]} cards={meta.cards || []} recent={recentItems} lastPay={meta.lastPay || "cash"} onSave={saveDay} onClear={() => clearDay(sel)} onClose={() => setSel(null)} hasData={hasEntry(data[sel])} />)}
      {quick && (<QuickAdd dateKey={todayKey} cards={meta.cards || []} recent={recentItems} presets={meta.presets || []} lastPay={meta.lastPay || "cash"} onAdd={(items, metaPatch) => addItemsToDay(todayKey, items, metaPatch)} onPresets={(list) => persistMeta({ ...meta, presets: list })} onClose={() => setQuick(false)} />)}
      {showExport && <ExportSheet csv={buildCSV()} backup={buildBackup()} onRestore={restoreBackup} onClose={() => setShowExport(false)} />}
    </div>
  );
}

function NavBtn({ children, onClick, label }) {
  return (<button onClick={onClick} aria-label={label} style={{ width: 40, height: 40, borderRadius: 12, border: `1px solid ${C.line}`, background: C.surface, color: C.ink, fontSize: 22, lineHeight: 1, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{children}</button>);
}

function Summary({ totals }) {
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 16, padding: "14px 16px", marginBottom: 18, boxShadow: "0 1px 2px rgba(44,39,31,.04)" }}>
      <div style={{ display: "flex", gap: 12 }}>
        <Stat label="予算合計" value={yen(totals.b)} color={C.budgetInk} />
        <div style={{ width: 1, background: C.lineSoft }} />
        <Stat label="支出合計" value={yen(totals.a)} color={C.ink} />
      </div>
    </div>
  );
}

function Stat({ label, value, color }) {
  return (<div style={{ flex: 1 }}><div style={{ fontSize: 11, color: C.muted, marginBottom: 3 }}>{label}</div><div style={{ fontSize: 17, fontWeight: 700, color, fontVariantNumeric: "tabular-nums" }}>{value}</div></div>);
}

function BudgetRemaining({ totals, period, today }) {
  if (totals.b <= 0) {
    return (<div style={{ background: C.surface, border: `1px dashed ${C.line}`, borderRadius: 14, padding: "13px 16px", marginBottom: 14, fontSize: 12.5, color: C.muted, textAlign: "center" }}>日付をタップして予算を入れると、今月の予算残高がここに出ます</div>);
  }
  const spent = totals.a, budget = totals.b, remaining = budget - spent;
  const over = remaining < 0;
  const ratio = Math.min(spent / budget, 1);
  // pace forecast: only while we're inside the displayed period
  let forecast = null;
  if (period && today >= period.start && today <= period.end && spent > 0) {
    const dayMs = 86400000;
    const elapsed = Math.floor((today - period.start) / dayMs) + 1;
    const totalDays = period.days.length;
    if (elapsed >= 2 && elapsed < totalDays) {
      const projected = Math.round((spent / elapsed) * totalDays);
      const gap = projected - budget;
      forecast = { projected, gap };
    }
  }
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: "14px 16px", marginBottom: 14, boxShadow: "0 1px 2px rgba(44,39,31,.04)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 2 }}>今月の予算残高</div>
          <div style={{ fontSize: 24, fontWeight: 700, color: over ? C.over : C.good, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{over ? "−" : ""}{yen(Math.abs(remaining))}</div>
        </div>
        <div style={{ fontSize: 11, color: C.muted, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>支出 {yen(spent)}<br />予算 {yen(budget)}</div>
      </div>
      <div style={{ height: 8, borderRadius: 4, background: C.lineSoft, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${ratio * 100}%`, background: over ? C.over : C.good, borderRadius: 4, transition: "width .3s" }} />
      </div>
      {over && <div style={{ fontSize: 11.5, color: C.over, fontWeight: 600, marginTop: 8 }}>予算を{yen(Math.abs(remaining))}オーバーしています</div>}
      {!over && forecast && (
        <div style={{ fontSize: 11.5, fontWeight: 600, marginTop: 8, color: forecast.gap > 0 ? C.over : C.good }}>
          このペースだと月末は約{yen(forecast.projected)}{forecast.gap > 0 ? ` — 予算を約${yen(forecast.gap)}オーバーしそう` : ` — 約${yen(Math.abs(forecast.gap))}残りそう`}
        </div>
      )}
    </div>
  );
}

function DayCell({ day, monthTag, entry, today, onClick }) {
  const has = hasEntry(entry), actual = actualOf(entry), budget = entry ? entry.budget || 0 : 0;
  let barColor = C.faint, ratio = 0, statusColor = C.muted;
  if (has) {
    if (budget > 0) { ratio = Math.min(actual / budget, 1); const over = actual > budget; barColor = over ? C.over : C.good; statusColor = over ? C.over : C.good; }
    else if (actual > 0) { ratio = 1; barColor = C.over; statusColor = C.over; }
  }
  const hasCard = entry && Array.isArray(entry.items) && entry.items.some((it) => isCardPay(it.pay) && it.amount > 0);
  return (
    <button onClick={onClick} style={{ position: "relative", aspectRatio: "1 / 1.15", borderRadius: 10, border: today ? `1.5px solid ${C.seal}` : `1px solid ${C.lineSoft}`, background: today ? "rgba(200,85,61,0.08)" : C.surface, padding: "5px 5px 4px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "stretch", overflow: "hidden", textAlign: "left" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ display: "flex", alignItems: "center", lineHeight: 1 }}>{monthTag ? <span style={{ fontSize: 8, color: C.budgetInk, marginRight: 2 }}>{monthTag}</span> : null}{today ? <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", minWidth: 18, height: 18, padding: "0 4px", borderRadius: 9, background: C.seal, color: "#fff", fontSize: 11, fontWeight: 700 }}>{day}</span> : <span style={{ fontSize: 12, fontWeight: 500, color: C.ink }}>{day}</span>}</span>
        {hasCard && <span style={{ fontSize: 8, fontWeight: 700, color: CARD_COLOR, lineHeight: 1 }}>CARD</span>}
      </div>
      {has ? (
        <div style={{ marginTop: "auto", width: "100%" }}>
          <span style={{ display: "block", fontSize: 10, fontWeight: 700, color: statusColor, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginBottom: 3 }}>{yen(actual)}</span>
          <div style={{ height: 3, borderRadius: 2, background: C.lineSoft, overflow: "hidden" }}><div style={{ height: "100%", width: `${ratio * 100}%`, background: barColor }} /></div>
        </div>
      ) : (<span style={{ marginTop: "auto", fontSize: 10, color: C.faint }}>+</span>)}
    </button>
  );
}

function Editor({ dateKey, entry, cards, prefill, recent, lastPay, onSave, onClear, onClose, hasData }) {
  const [y, m, d] = dateKey.split("-");
  const wd = WEEK[new Date(+y, +m - 1, +d).getDay()];
  const payOptions = [{ id: "cash", label: "現金", dot: CASH_COLOR }, ...cards.map((c) => ({ id: c.id, label: c.name || "カード", dot: CARD_COLOR }))];
  const [budgetCash, setBudgetCash] = useState(entry ? (entry.budgetCash !== undefined ? String(entry.budgetCash || "") : (entry.budget ? String(entry.budget) : "")) : "");
  const [budgetCard, setBudgetCard] = useState(entry && entry.budgetCard !== undefined ? String(entry.budgetCard || "") : "");
  const [items, setItems] = useState(() => {
    let base = [];
    if (entry && Array.isArray(entry.items) && entry.items.length) base = entry.items.map((it) => ({ id: uid(), cat: it.cat || "other", amount: String(it.amount || ""), pay: resolvePay(it.pay, cards) }));
    else if (entry && entry.actual) base = [{ id: uid(), cat: "other", amount: String(entry.actual), pay: "cash" }];
    const pre = Array.isArray(prefill) ? prefill.map((p) => ({ id: uid(), cat: CAT_BY_ID[p.cat] ? p.cat : "other", amount: String(p.amount || ""), pay: resolvePay(p.pay, cards) })) : [];
    const combined = [...base, ...pre];
    return combined.length ? combined : [{ id: uid(), cat: "food", amount: "", pay: "cash" }];
  });
  const total = items.reduce((s, it) => s + numOf(it.amount), 0);
  const cardTotal = items.reduce((s, it) => s + (isCardPay(it.pay) ? numOf(it.amount) : 0), 0);
  const cashTotal = total - cardTotal;
  const cashBudget = numOf(budgetCash), cardBudget = numOf(budgetCard), totalBudget = cashBudget + cardBudget;
  const diff = totalBudget - total, over = diff < 0;
  const defPay = resolvePay(lastPay || "cash", cards);
  const setItem = (id, f, v) => setItems((arr) => arr.map((it) => (it.id === id ? { ...it, [f]: v } : it)));

        <div style={{ width: 38, height: 4, borderRadius: 2, background: C.line, margin: "0 auto 16px" }} />

        <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
          <label style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 12, color: CASH_COLOR, fontWeight: 600 }}>現金予算</span>

          <label style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 12, color: CARD_COLOR, fontWeight: 600 }}>カード予算</span>

        {recent && recent.length > 0 && (

            <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 8 }}>最近の項目(タップで追加)</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {recent.map((r, i) => (
                <button key={i} onClick={() => addRecent(r)} style={{ border: `1px solid ${C.line}`, background: C.surface, borderRadius: 999, padding: "7px 11px", fontSize: 12, fontWeight: 600, color: C.ink, cursor: "pointer", fontFamily: FONT, display: "inline-flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 4, background: CAT_BY_ID[r.cat] ? CAT_BY_ID[r.cat].color : C.faint }} />
                  {CAT_BY_ID[r.cat] ? CAT_BY_ID[r.cat].label : "その他"} {yen(r.amount)}
                </button>
              ))}
            </div>
          </div>

        <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 10 }}>使ったもの(カテゴリ・支払い方法)</div>
        {items.map((it) => (
          <div key={it.id} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: `1px solid ${C.lineSoft}` }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <PickSelect value={it.cat} onChange={(v) => setItem(it.id, "cat", v)} options={CATS.map((c) => ({ id: c.id, label: c.label, dot: c.color }))} flex />

                <input type="text" inputMode="numeric" value={it.amount} onChange={(e) => setItem(it.id, "amount", e.target.value.replace(/[^0-9]/g, ""))} placeholder="0" style={{ width: "100%", minWidth: 0, border: "none", outline: "none", background: "transparent", fontSize: 16, fontWeight: 700, color: C.ink, padding: "11px 0", fontVariantNumeric: "tabular-nums", fontFamily: FONT }} />

          <div style={{ display: "flex", gap: 8, marginTop: 8, fontSize: 12 }}><span style={{ flex: 1, color: CASH_COLOR, fontWeight: 600 }}>現金 {yen(cashTotal)} / 予算 {yen(cashBudget)}</span><span style={{ flex: 1, color: CARD_COLOR, fontWeight: 600 }}>カード {yen(cardTotal)} / 予算 {yen(cardBudget)}</span></div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, paddingTop: 10, borderTop: `1px dashed ${C.line}` }}><span style={{ fontSize: 13, fontWeight: 600, color: over ? C.over : C.good }}>差額(予算 {yen(totalBudget)})</span><span style={{ fontSize: 18, fontWeight: 700, color: over ? C.over : C.good, fontVariantNumeric: "tabular-nums" }}>{over ? "−" : "+"}{yen(Math.abs(diff))}</span></div>

          <button onClick={() => onSave(dateKey, cashBudget, cardBudget, items)} style={{ flex: 1, padding: "13px 16px", borderRadius: 13, border: "none", background: C.seal, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>保存</button>

function QuickAdd({ dateKey, cards, recent, presets, lastPay, onAdd, onPresets, onClose }) {
  const payOptions = [{ id: "cash", label: "現金", dot: CASH_COLOR }, ...cards.map((c) => ({ id: c.id, label: c.name || "カード", dot: CARD_COLOR }))];
  const [amount, setAmount] = useState("");
  const [cat, setCat] = useState("other");
  const [pay, setPay] = useState(resolvePay(lastPay, cards));
  const [count, setCount] = useState(0);
  const [editPresets, setEditPresets] = useState(false);
  const chip = { border: `1px solid ${C.line}`, background: C.surface, borderRadius: 999, padding: "8px 12px", fontSize: 12.5, fontWeight: 600, color: C.ink, cursor: "pointer", fontFamily: FONT, display: "inline-flex", alignItems: "center", gap: 6 };
  const catLabel = (id) => (CAT_BY_ID[id] ? CAT_BY_ID[id].label : "その他");
  const payLabel = (p) => (isCardPay(p) ? cardName(resolvePay(p, cards), cards) : "現金");
  const addOne = (it, stay) => { onAdd([it]); setCount((c) => c + 1); if (!stay) onClose(); };
  const saveCurrent = (stay) => { if (!(numOf(amount) > 0)) return; addOne({ cat, amount: numOf(amount), pay }, stay); setAmount(""); };
  const registerPreset = () => {
    if (!(numOf(amount) > 0)) return;
    onPresets([...(presets || []), { id: uid(), cat, amount: numOf(amount), pay }]);
  };
  const removePreset = (id) => onPresets((presets || []).filter((p) => p.id !== id));
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(44,39,31,.32)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 460, maxHeight: "88vh", overflowY: "auto", background: C.paper, borderRadius: "22px 22px 0 0", padding: "10px 18px 26px", boxShadow: "0 -8px 30px rgba(44,39,31,.18)" }}>
        <div style={{ width: 38, height: 4, borderRadius: 2, background: C.line, margin: "0 auto 16px" }} />

                <button key={p.id} onClick={() => (editPresets ? removePreset(p.id) : addOne({ cat: p.cat, amount: p.amount, pay: resolvePay(p.pay, cards) }, true))} style={{ ...chip, borderColor: editPresets ? C.over : C.line }}>

          <span style={{ fontSize: 18, color: C.faint, marginRight: 4 }}>¥</span>
          <input type="text" inputMode="numeric" autoFocus value={amount} onChange={(e) => setAmount(e.target.value.replace(/[^0-9]/g, ""))} placeholder="0" style={{ flex: 1, border: "none", outline: "none", background: "transparent", fontSize: 24, fontWeight: 700, color: C.ink, padding: "13px 0", fontVariantNumeric: "tabular-nums", fontFamily: FONT, width: "100%" }} />
        </div>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <PickSelect value={cat} onChange={setCat} options={CATS.map((c) => ({ id: c.id, label: c.label, dot: c.color }))} flex />

        </div>

      </div>
    </div>
  );
}

function Analysis({ data, periodKeys }) {
  const map = {};
  let totalSpend = 0, daysCount = 0, topDay = null;
  periodKeys.forEach((k) => {
    const e = data[k];
    if (!e) return;
    const items = Array.isArray(e.items) ? e.items : e.actual ? [{ cat: "other", amount: e.actual }] : [];
    let dayTotal = 0;
    items.forEach((it) => { if (!it.amount) return; const id = it.cat || "other"; map[id] = (map[id] || 0) + it.amount; totalSpend += it.amount; dayTotal += it.amount; });
    if (dayTotal > 0) { daysCount++; if (!topDay || dayTotal > topDay.amount) topDay = { day: +k.slice(8, 10), amount: dayTotal }; }
  });
  const slices = CATS.map((c) => ({ id: c.id, label: c.label, color: c.color, amount: map[c.id] || 0 })).filter((s) => s.amount > 0).sort((a, b) => b.amount - a.amount);
  const avg = daysCount ? totalSpend / daysCount : 0;
  if (totalSpend === 0) return (<div style={{ textAlign: "center", padding: "48px 20px", color: C.muted }}><div style={{ fontSize: 30, marginBottom: 10 }}>🥧</div><div style={{ fontSize: 14, lineHeight: 1.7 }}>この月の支出記録がまだありません。<br />カレンダーで使ったものを入力すると、ここに円グラフが出ます。</div></div>);
  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <MiniStat label="記録した日数" value={`${daysCount}日`} />
        <MiniStat label="1日あたり平均" value={yen(avg)} />
        {topDay && <MiniStat label="最も使った日" value={`${topDay.day}日`} sub={yen(topDay.amount)} />}
      </div>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 22 }}><Donut slices={slices} total={totalSpend} /></div>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.ink, marginBottom: 12 }}>カテゴリ別の内訳</div>
      {slices.map((s) => { const pct = (s.amount / totalSpend) * 100; return (
        <div key={s.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.lineSoft}` }}>
          <span style={{ display: "flex", alignItems: "center", gap: 9, fontSize: 14, fontWeight: 600, color: C.ink }}><span style={{ width: 11, height: 11, borderRadius: 3, background: s.color, display: "inline-block" }} />{s.label}</span>
          <span style={{ fontSize: 13, color: C.muted, fontVariantNumeric: "tabular-nums" }}><strong style={{ color: C.ink, fontWeight: 700, fontSize: 14 }}>{yen(s.amount)}</strong><span style={{ marginLeft: 7 }}>{Math.round(pct)}%</span></span>
        </div>); })}
    </div>
  );
}

function Donut({ slices, total, size = 196 }) {
  const stroke = 34, r = (size - stroke) / 2, cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
  let cum = 0;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.lineSoft} strokeWidth={stroke} />
        {slices.map((s) => { const dash = (s.amount / total) * circ; const seg = (<circle key={s.id} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={-cum} transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="butt" />); cum += dash; return seg; })}
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontSize: 11, color: C.muted, marginBottom: 2 }}>支出合計</span>
        <span style={{ fontSize: 21, fontWeight: 700, color: C.ink, fontVariantNumeric: "tabular-nums" }}>{yen(total)}</span>
      </div>
    </div>
  );
}

  const autoCardTotal = cards.reduce((s, c) => s + (auto[c.id] || 0), 0);
  const real = totalBank - usedCardTotal;

        <div style={{ flex: 1, background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: "13px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 5 }}><span style={{ width: 9, height: 9, borderRadius: 3, background: CARD_COLOR }} /><span style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>今月のカード利用</span></div>
          <div style={{ fontSize: 17, fontWeight: 700, color: C.ink, fontVariantNumeric: "tabular-nums" }}>{yen(autoCardTotal)}</div>
        </div>
      </div>

      <SectionTitle note="先月の未配分を繰り越し、「支出予算」はカレンダーの予算に反映されます。">収入と配分</SectionTitle>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>収入</span>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted, cursor: "pointer" }}>
          <input type="checkbox" checked={carryOn} onChange={(e) => setCarryOn(e.target.checked)} style={{ accentColor: C.seal }} />
          前月繰越を含める
        </label>
      </div>
      {carryOn && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, padding: "11px 14px", border: `1px solid ${C.lineSoft}`, borderRadius: 11, background: C.surface }}>
          <span style={{ fontSize: 13, color: C.muted }}>前月繰越{carryIn < 0 ? "(先月の不足)" : ""}</span>
          <span style={{ fontSize: 15, fontWeight: 700, color: carryIn < 0 ? C.over : C.ink, fontVariantNumeric: "tabular-nums" }}>{carryIn < 0 ? "−" : ""}{yen(Math.abs(carryIn))}</span>
        </div>
      )}
      <EditList items={incomeList} onChange={setIncome} namePlaceholder="例: 給料" />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, marginBottom: 24, padding: "10px 14px", background: C.goodSoft, borderRadius: 12 }}>
        <span style={{ fontSize: 13, fontWeight: 600, color: C.good }}>収入合計{carryOn ? "(繰越込み)" : ""}</span>
        <span style={{ fontSize: 18, fontWeight: 700, color: C.good, fontVariantNumeric: "tabular-nums" }}>{yen(totalIncome)}</span>
      </div>

      <label style={{ display: "block", marginBottom: 6 }}>
        <span style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>支出予算</span>
        <MoneyInput value={budgetStr} onChange={setBudget} color={C.seal} big />
      </label>
      <div style={{ fontSize: 11.5, color: C.faint, marginBottom: 24, lineHeight: 1.5 }}>ここに入れた予算は、カレンダーの「今月の予算残高」に反映されます。配分の一部として扱われます。</div>

      <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 8 }}>その他の配分(貯金など)</div>
      <EditList items={allocList} onChange={setAlloc} namePlaceholder="例: 貯金" />
      {allocBars.length > 0 && (
        <div style={{ display: "flex", height: 12, borderRadius: 6, overflow: "hidden", marginTop: 14, background: C.lineSoft }}>
          {allocBars.map((a) => (<div key={a.id} style={{ width: `${(a.amount / Math.max(totalIncome, totalAlloc, 1)) * 100}%`, background: a.color }} />))}
        </div>
      )}
      {allocBars.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 14px", marginTop: 12 }}>
          {allocBars.map((a) => (<span key={a.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: C.muted }}><span style={{ width: 9, height: 9, borderRadius: 3, background: a.color }} />{a.name || "(無名)"} {yen(a.amount)}</span>))}
        </div>
      )}
      <div style={{ marginTop: 16, padding: "12px 14px", borderRadius: 12, background: C.surface, border: `1px solid ${C.line}` }}>
        <Row label="収入合計" value={yen(totalIncome)} color={C.ink} />
        <Row label="配分合計(予算含む)" value={yen(totalAlloc)} color={C.ink} />
        <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px dashed ${C.line}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div><div style={{ fontSize: 14, fontWeight: 700, color: C.ink }}>未配分</div><div style={{ fontSize: 10.5, color: C.faint }}>{unalloc < 0 ? "配分しすぎです" : "翌月へ繰り越されます"}</div></div>
          <span style={{ fontSize: 22, fontWeight: 700, color: unalloc < 0 ? C.over : unalloc === 0 && totalIncome > 0 ? C.good : C.budgetInk, fontVariantNumeric: "tabular-nums" }}>{yen(unalloc)}</span>
        </div>
      </div>

      <div style={{ height: 1, background: C.lineSoft, margin: "30px 0 18px" }} />
      <SectionTitle note="家賃やサブスクなど毎月決まった支出を登録すると、毎月その日に自動でカレンダーへ記録されます。">固定費(毎月自動で記録)</SectionTitle>
      <FixedEditor items={meta.fixed || []} cards={cards} onChange={(list) => onMeta({ ...meta, fixed: list })} />

      <div style={{ height: 1, background: C.lineSoft, margin: "30px 0 18px" }} />
      <SectionTitle note="用途ごとに貯める枠です。収入・支出・予算の集計には含まれません。">用途別の貯蓄枠</SectionTitle>
      <SavingsEditor items={savings} onChange={setSavings} />
      {savings.length > 0 && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, padding: "10px 14px", background: C.goodSoft, borderRadius: 12 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.good }}>貯蓄枠の合計</span>
          <span style={{ fontSize: 18, fontWeight: 700, color: C.good, fontVariantNumeric: "tabular-nums" }}>{yen(totalSaved)}</span>
        </div>
      )}
    </div>
  );
}

function FixedEditor({ items, cards, onChange }) {
  const payOptions = [{ id: "cash", label: "現金", dot: CASH_COLOR }, ...cards.map((c) => ({ id: c.id, label: c.name || "カード", dot: CARD_COLOR }))];
  const add = () => onChange([...(items || []), { id: uid(), cat: "home", amount: "", pay: "cash", day: 1 }]);
  const set = (id, f, v) => onChange(items.map((x) => (x.id === id ? { ...x, [f]: v } : x)));
  const remove = (id) => onChange(items.filter((x) => x.id !== id));
  return (
    <div>
      {(items || []).map((f) => (
        <div key={f.id} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: `1px solid ${C.lineSoft}` }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <PickSelect value={f.cat} onChange={(v) => set(f.id, "cat", v)} options={CATS.map((c) => ({ id: c.id, label: c.label, dot: c.color }))} flex />
            <div style={{ display: "flex", alignItems: "center", width: 110, border: `1px solid ${C.line}`, borderRadius: 11, background: C.surface, padding: "0 10px" }}>
              <span style={{ fontSize: 14, color: C.faint, marginRight: 2 }}>¥</span>
              <input type="text" inputMode="numeric" value={f.amount} onChange={(e) => set(f.id, "amount", e.target.value.replace(/[^0-9]/g, ""))} placeholder="0" style={{ width: "100%", minWidth: 0, border: "none", outline: "none", background: "transparent", fontSize: 15, fontWeight: 700, color: C.ink, padding: "11px 0", fontVariantNumeric: "tabular-nums", fontFamily: FONT }} />
            </div>
            <button onClick={() => remove(f.id)} aria-label="この固定費を削除" style={{ width: 30, height: 30, flexShrink: 0, borderRadius: 8, border: "none", background: "transparent", color: C.faint, fontSize: 20, cursor: "pointer", lineHeight: 1 }}>×</button>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 8 }}>
            <div style={{ flex: 1, maxWidth: 170 }}><PickSelect value={f.pay} onChange={(v) => set(f.id, "pay", v)} options={payOptions} small /></div>
            <span style={{ fontSize: 12, color: C.muted }}>毎月</span>
            <div style={{ display: "flex", alignItems: "center", width: 64, border: `1px solid ${C.line}`, borderRadius: 10, background: C.surface, padding: "0 8px" }}>
              <input type="text" inputMode="numeric" value={f.day || ""} onChange={(e) => { const n = Math.min(28, Math.max(0, numOf(e.target.value.replace(/[^0-9]/g, "")))); set(f.id, "day", n || ""); }} placeholder="1" style={{ width: "100%", border: "none", outline: "none", background: "transparent", fontSize: 14, fontWeight: 700, color: C.ink, padding: "9px 0", textAlign: "center", fontFamily: FONT }} />
            </div>
            <span style={{ fontSize: 12, color: C.muted }}>日</span>
          </div>
        </div>
      ))}
      <button onClick={add} style={{ fontSize: 13, fontWeight: 600, color: C.budgetInk, background: "transparent", border: `1px dashed ${C.line}`, borderRadius: 11, padding: "10px 0", width: "100%", cursor: "pointer", fontFamily: FONT }}>＋ 固定費を追加</button>
      <p style={{ fontSize: 11, color: C.faint, marginTop: 8, lineHeight: 1.6 }}>※日付は1〜28。登録した日付が来ると、その月の分が自動で記録されます(同じ月に二重には記録されません)。</p>
    </div>
  );
}

function ExportSheet({ csv, backup, onRestore, onClose }) {
  const [copied, setCopied] = useState(false);
  const [bkCopied, setBkCopied] = useState(false);
  const [restoreText, setRestoreText] = useState("");
  const [msg, setMsg] = useState("");
  const empty = csv.count === 0;
  const copyTo = async (text, set, id) => { try { await navigator.clipboard.writeText(text); set(true); setTimeout(() => set(false), 1800); } catch (e) { const el = document.getElementById(id); if (el) { el.focus(); el.select(); } } };
  const doRestore = () => {
    if (!restoreText.trim()) { setMsg("バックアップを貼り付けてください。"); return; }
    const err = onRestore(restoreText.trim());
    setMsg(err || "復元しました ✓");
    if (!err) setTimeout(onClose, 900);
  };
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(44,39,31,.32)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 460, maxHeight: "90vh", overflowY: "auto", background: C.paper, borderRadius: "22px 22px 0 0", padding: "10px 18px 26px", boxShadow: "0 -8px 30px rgba(44,39,31,.18)" }}>
        <div style={{ width: 38, height: 4, borderRadius: 2, background: C.line, margin: "0 auto 16px" }} />

        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>このデータのURL</div>
        <p style={{ fontSize: 12, color: C.muted, margin: "0 0 8px", lineHeight: 1.6 }}>このURLを開けば、別の端末でも同じ家計簿が見られます。リンク=合言葉なので、見せたくない人には共有しないでください。</p>
        <div style={{ display: "flex", gap: 8 }}>
          <input readOnly value={typeof window !== "undefined" ? window.location.href : ""} onFocus={(e) => e.target.select()} style={{ flex: 1, minWidth: 0, border: `1px solid ${C.line}`, borderRadius: 11, background: C.surface, padding: "10px 12px", fontSize: 12, color: C.ink, fontFamily: "ui-monospace,SFMono-Regular,Menlo,monospace" }} />
          <button onClick={() => { try { navigator.clipboard.writeText(window.location.href); } catch (e) {} }} style={{ padding: "10px 14px", borderRadius: 11, border: "none", background: C.budgetInk, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>コピー</button>
        </div>
        <div style={{ height: 1, background: C.lineSoft, margin: "18px 0" }} />

        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>バックアップ(全データ・設定)</div>
        <p style={{ fontSize: 12, color: C.muted, margin: "0 0 10px", lineHeight: 1.6 }}>口座・カード・締め日などの設定も含めた丸ごとの控えです。コピーしてメモなどに保存しておけば、設定が消えても復元できます。</p>
        <textarea id="backup-text" readOnly value={backup} onFocus={(e) => e.target.select()} style={{ width: "100%", height: 90, resize: "none", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, background: C.surface, padding: 12, fontSize: 11.5, lineHeight: 1.5, color: C.ink, fontFamily: "ui-monospace,SFMono-Regular,Menlo,monospace" }} />
        <button onClick={() => copyTo(backup, setBkCopied, "backup-text")} style={{ width: "100%", marginTop: 8, padding: "12px", borderRadius: 12, border: "none", background: bkCopied ? C.good : C.budgetInk, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>{bkCopied ? "コピーしました ✓" : "バックアップをコピー"}</button>

        <div style={{ height: 1, background: C.lineSoft, margin: "22px 0 18px" }} />

        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>復元</div>
        <p style={{ fontSize: 12, color: C.muted, margin: "0 0 10px", lineHeight: 1.6 }}>控えたバックアップを貼り付けて「復元」を押すと、設定とデータが丸ごと戻ります(今の内容は上書きされます)。</p>
        <textarea value={restoreText} onChange={(e) => setRestoreText(e.target.value)} placeholder="ここにバックアップを貼り付け" style={{ width: "100%", height: 80, resize: "none", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, background: C.surface, padding: 12, fontSize: 11.5, lineHeight: 1.5, color: C.ink, fontFamily: "ui-monospace,SFMono-Regular,Menlo,monospace", outline: "none" }} />
        {msg && <div style={{ fontSize: 12, color: msg.indexOf("✓") !== -1 ? C.good : C.over, marginTop: 8, fontWeight: 600 }}>{msg}</div>}
        <button onClick={doRestore} style={{ width: "100%", marginTop: 8, padding: "12px", borderRadius: 12, border: `1px solid ${C.line}`, background: "transparent", color: C.ink, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>復元する</button>

        <div style={{ height: 1, background: C.lineSoft, margin: "22px 0 18px" }} />

        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>CSVで書き出す</div>
        <p style={{ fontSize: 12, color: C.muted, margin: "0 0 10px", lineHeight: 1.6 }}>{empty ? "まだ記録がありません。" : "表計算アプリ向けの支出データです。"}</p>
        {!empty && (<>
          <textarea id="export-text" readOnly value={csv.text} onFocus={(e) => e.target.select()} style={{ width: "100%", height: 120, resize: "none", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, background: C.surface, padding: 12, fontSize: 12, lineHeight: 1.6, color: C.ink, fontFamily: "ui-monospace,SFMono-Regular,Menlo,monospace", fontVariantNumeric: "tabular-nums" }} />
          <button onClick={() => copyTo(csv.text, setCopied, "export-text")} style={{ width: "100%", marginTop: 8, padding: "12px", borderRadius: 12, border: "none", background: copied ? C.good : C.seal, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>{copied ? "コピーしました ✓" : "CSVをコピー"}</button>
        </>)}

        <button onClick={onClose} style={{ width: "100%", marginTop: 18, padding: "13px", borderRadius: 13, border: `1px solid ${C.line}`, background: "transparent", color: C.muted, fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>閉じる</button>
      </div>
    </div>
  );
}


function Welcome(){
  const start = () => { location.hash = "g=" + genToken(); location.reload(); };
  return (
    <div style={{ minHeight:"100vh", background:"#FBF8F1", color:"#2C271F", fontFamily:FONT, display:"flex", alignItems:"center", justifyContent:"center", padding:"30px 20px" }}>
      <div style={{ maxWidth:420, width:"100%", textAlign:"center" }}>
        <div style={{ width:12, height:12, borderRadius:3, background:"#C8553D", margin:"0 auto 18px" }} />
        <h1 style={{ fontSize:22, fontWeight:700, margin:"0 0 10px" }}>家計簿カレンダー</h1>
        <p style={{ fontSize:14, color:"#9A9081", lineHeight:1.8, margin:"0 0 26px" }}>新しい家計簿を作成します。作成するとURLが発行されます。そのURLをブックマークしておけば、別の端末でも同じURLで同じ家計簿が開けます。</p>
        <button onClick={start} style={{ width:"100%", padding:"15px", borderRadius:14, border:"none", background:"#C8553D", color:"#fff", fontSize:16, fontWeight:700, cursor:"pointer", fontFamily:FONT }}>新しい家計簿をはじめる</button>
      </div>
    </div>
  );
}
(async function(){
  if(TOKEN){ await cloudLoad(); ReactDOM.createRoot(document.getElementById("root")).render(<BudgetCalendar />); }
  else { ReactDOM.createRoot(document.getElementById("root")).render(<Welcome />); }
})();

</script>
</body>
</html>
